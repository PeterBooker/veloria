{{define "search_context.html"}}
<div class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);" role="dialog" aria-modal="true">
    <button type="button"
            class="absolute inset-0 w-full h-full cursor-pointer"
            aria-label="Close modal"
            onclick="document.getElementById('context-modal').innerHTML = ''"></button>
    <div class="relative z-10 w-full max-w-3xl glass-inner overflow-hidden">
        <div class="flex items-center justify-between px-4 lg:px-5 py-3 lg:py-4 border-b border-gray-200 bg-white">
            <div>
                <p class="text-xs text-gray-600 uppercase tracking-widest font-semibold mb-1">Match Context</p>
                <div class="text-sm text-gray-900 font-mono truncate font-medium">{{.Filename}}</div>
            </div>
            <button type="button"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition"
                    onclick="document.getElementById('context-modal').innerHTML = ''">
                <span class="sr-only">Close</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="p-4 lg:p-5">
            {{if .Error}}
            <div class="p-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm">
                {{.Error}}
            </div>
            {{else}}
            <div class="rounded-xl overflow-hidden border border-gray-200 bg-white">
                <table class="w-full" style="border-collapse: collapse; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; line-height: 1.65;">
                    <tbody>
                        {{range .Lines}}
                        <tr class="{{if .IsMatch}}bg-brand-50{{else}}bg-gray-50 hover:bg-gray-100{{end}} transition-colors">
                            <td class="px-2 lg:px-3 py-0.5 text-gray-400 text-right select-none whitespace-nowrap border-r-2 {{if .IsMatch}}border-brand-400{{else}}border-transparent{{end}}" style="width: 1px;">{{.Number}}</td>
                            <td class="px-3 lg:px-4 py-0.5 {{if .IsMatch}}text-gray-900{{else}}text-gray-600{{end}} whitespace-pre overflow-x-auto">{{.Text}}</td>
                        </tr>
                        {{end}}
                    </tbody>
                </table>
            </div>
            {{end}}
        </div>
    </div>
</div>
{{end}}

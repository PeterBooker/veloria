services:
  postgres:
    image: 'postgres:17-alpine'
    shm_size: 512mb
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_DATABASE}'
    volumes:
      - 'veloria-postgres:/var/lib/postgresql/data'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      interval: 3s
      timeout: 5s
      retries: 5
    networks:
      - veloria

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${MAILPIT_PORT:-1025}:1025'
      - '${MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - veloria

  minio:
    image: 'minio/minio:latest'
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: '${S3_ACCESS_KEY:-minioadmin}'
      MINIO_ROOT_PASSWORD: '${S3_SECRET_KEY:-minioadmin}'
    command: server /data --console-address ":9001"
    volumes:
      - 'veloria-minio:/data'
    networks:
      - veloria
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: 'minio/mc:latest'
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/$${S3_BUCKET:-veloria-searches};
      exit 0;
      "
    networks:
      - veloria

networks:
  veloria:
    driver: bridge
volumes:
  veloria-postgres:
    driver: local
  veloria-redis:
    driver: local
  veloria-minio:
    driver: local
